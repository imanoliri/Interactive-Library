<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Table</title>
    <link rel="stylesheet" href="writing_table.css">

</head>
<body>
    <div class="main-container">
        <div class="header-bar">
            <h1>Writing Table</h1>
            <div class="controls">
                <button onclick="clearAllCells()">Clear All</button>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="checkSpeakLettersWhenDropped"> Speak Letters</label>
                    <label><input type="checkbox" id="checkSpeakWordsWhenCorrect"> Speak Words</label>
                </div>
            </div>
            <p class="instructions">Drag letters to form words. <br/>Double-click to clear.</p>
        </div>
        <div class="grid"></div>
    </div>
    <script src="writing_table.js"></script>
</body>
</html>
