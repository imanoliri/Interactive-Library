<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Battle Simulator</title>
    <link rel="stylesheet" href="../shared_game_styles.css">
    <link rel="stylesheet" href="battle.css">
</head>
<body>
    <div class="game-container battle-arena">
        <h1>Battle Simulator</h1>
        
        <div class="battle-layout">
            <!-- Left: Sidebar Controls -->
            <div class="battle-sidebar">
                <div class="control-group">
                    <h3>Simulation Filters</h3>
                    <label><input type="checkbox" id="meleeNetwork" checked> Melee</label>
                    <label><input type="checkbox" id="archerNetwork" checked> Archer</label>
                    <label><input type="checkbox" id="flierNetwork" checked> Flier</label>
                    <label><input type="checkbox" id="cavalryNetwork" checked> Cavalry</label>
                    <label><input type="checkbox" id="siegeNetwork" checked> Siege</label>
                </div>

                <div class="control-group">
                    <h3>Difficulty</h3>
                    <div class="slider-row">
                        <input type="range" id="difficultySlider" min="1" max="5" step="1" value="1">
                        <span id="sliderValue">1</span>
                    </div>
                </div>

                <div class="control-group">
                    <h3>Campaign</h3>
                    <select id="battleDropdown">
                        <option value="">Choose a battle...</option>
                    </select>
                </div>

                <div class="button-stack">
                    <button id="setDifficultyButton">Update Battle</button>
                    <button id="instructionsButton" class="btn-secondary">Instructions</button>
                    <button id="mapInfoButton" class="btn-secondary">Map Detail</button>
                </div>
            </div>

            <!-- Center: Battlefield -->
            <div class="battle-main">
                <div id="battlefield" class="battlefield">
                    <div class="map-overlay"></div>
                </div>
            </div>

            <!-- Right: Live Log & Stats -->
            <div class="battle-data">
                <div class="log-section">
                    <h3>Battle Log</h3>
                    <textarea id="logTextbox" readonly placeholder="Combat events will appear here..."></textarea>
                </div>
                
                <div class="stats-section">
                    <h3>Units Health</h3>
                    <div id="healthBar" class="health-bar"></div>
                    <div class="scrollable-table">
                        <table id="unitTable">
                            <thead>
                                <tr>
                                    <th>Unit</th>
                                    <th>Team</th>
                                    <th>HP</th>
                                    <th>ATK</th>
                                    <th>DEF</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <a href="javascript:history.back()" class="nav-link">← Return to Book</a>
    </div>

    <!-- Modals -->
    <div id="instructionsModal" class="modal">
        <div class="modal-content glass-modal">
            <h2>📜 Battle Instructions</h2>
            <div id="instructionsText"></div>
            <button id="closeInstructionsModal" class="btn-secondary">Dismiss</button>
        </div>
    </div>

    <div id="mapInfoModal" class="modal">
        <div class="modal-content glass-modal">
            <h2>🗺️ Map Intelligence</h2>
            <div id="mapInfoText"></div>
            <button id="closeMapInfoModal" class="btn-secondary">Dismiss</button>
        </div>
    </div>

    <script type="module" src="battle.js"></script>
</body>
</html>
