<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magical Lore Gaps</title>
  <link rel="stylesheet" href="../shared_game_styles.css">
  <link rel="stylesheet" href="fill_the_gaps.css">
</head>
<body>
  <div class="game-container scroll-aesthetic">
    <h1>Fill the Gaps</h1>
    
    <div class="game-toolbar">
        <label for="gap-slider">Difficulty (Gaps): <span id="gap-count">3</span></label>
        <input type="range" id="gap-slider" min="1" max="15" value="3">
    </div>
    
    <div class="tabs">
      <button class="tab-button active" id="tab-gaps">Gaps</button>
      <button class="tab-button" id="tab-solution">Solution</button>
    </div>

    <div class="scroll-wrapper">
        <div id="gaps-content" class="tab-content active">
            <div id="paragraph" class="content-text"></div>
        </div>

        <div id="solution-content" class="tab-content">
            <div id="full-paragraph" class="content-text"></div>
        </div>
    </div>
    
    <div class="action-buttons">
        <button id="next-button">Next Story</button>
    </div>

    <a href="javascript:history.back()" class="nav-link">← Return to Book</a>
  </div>
  <script src="fill_the_gaps.js"></script>
</body>
</html>
