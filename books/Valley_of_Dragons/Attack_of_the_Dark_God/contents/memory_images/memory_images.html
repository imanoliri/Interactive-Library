<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Memory</title>
    <link rel="stylesheet" href="../shared_game_styles.css">
    <link rel="stylesheet" href="memory_images.css">
</head>
<body>
    <div class="game-container">
        <h1>Memory</h1>
        
        <div class="game-toolbar">
            <div class="stats">
                <span>Moves: <span id="moveCount">0</span></span>
                <span>Matches: <span id="matchCount">0</span></span>
            </div>
            <div class="difficulty-control">
                <label for="slider">Pairs: <span id="numImagesLabel">6</span></label>
                <div class="slider-wrapper">
                    <input type="range" id="slider" min="3" max="15" value="6">
                </div>
            </div>
        </div>

        <div class="memory-board" id="game-container"></div>
        
        <div class="action-buttons">
            <button id="reset-button">New Game</button>
        </div>

        <a href="javascript:history.back()" class="nav-link">← Return to Book</a>
    </div>
    <script src="memory_images.js"></script>
</body>
</html>
