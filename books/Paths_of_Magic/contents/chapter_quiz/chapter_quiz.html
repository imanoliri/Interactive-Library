<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter Quiz</title>
    <link rel="stylesheet" href="../shared_game_styles.css">
    <link rel="stylesheet" href="chapter_quiz.css">
</head>
<body>
    <div class="container">
        <h1>Chapter Quiz</h1>
        <p>Which chapter is this from?</p>
        
        <div id="passage" class="passage"></div>
        <div id="choices" class="options"></div>
        
        <div class="controls">
            <button id="next-btn" disabled>Next</button>
        </div>

        <div id="feedback" class="feedback"></div>
        <div class="quiz-status">
            Score: <span id="score">0</span> / <span id="total">0</span>
        </div>
        
        <a href="../../index.html" class="nav-link">← Back to Book</a>
    </div>
    
    <script src="chapter_quiz.js"></script>
</body>
</html>
