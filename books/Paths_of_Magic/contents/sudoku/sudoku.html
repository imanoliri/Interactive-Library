<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Game</title>
    <link rel="stylesheet" href="sudoku.css">
</head>
<body>
    <div class="header-bar">
        <h1>Sudoku Game</h1>
        <div class="slider-container">
            <label for="empty-cells-slider">Empty Squares: <span id="slider-value">15</span></label>
            <input type="range" id="empty-cells-slider" min="3" max="30" value="15">
        </div>
        <div class="button-group">
            <button id="toggle-correct" class="toggle active">Show Correct</button>
            <button id="toggle-errors" class="toggle active">Show Errors</button>
            <button id="reset">Reset</button>
            <button id="check">Check Solution</button>
        </div>
    </div>
    <div class="sudoku-board">
        <!-- 9x9 grid of cells will be here -->
    </div>
    <script src="sudoku.js"></script>
</body>
</html>
