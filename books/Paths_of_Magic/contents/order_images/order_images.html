<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Chronology</title>
    <link rel="stylesheet" href="../shared_game_styles.css">
    <link rel="stylesheet" href="order_images.css">
</head>
<body>
    <div class="game-container">
        <h1>Order the Story</h1>
        
        <div class="game-toolbar">
            <div class="difficulty-control">
                <label for="numImagesSlider">Sequence Length: <span id="numImagesLabel">6</span></label>
                <input type="range" id="numImagesSlider" min="3" max="10" value="6">
            </div>
            <div class="instruction-box">
                <p id="instruction-text">Click the images in the order they appeared in the story!</p>
            </div>
        </div>

        <div class="circle-wrapper">
            <div class="circle-container" id="circle-container">
                <div class="center-content">
                    <div id="progress-indicator">0 / 0</div>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button id="reset-btn" class="btn-secondary">New Timeline</button>
        </div>

        <a href="javascript:history.back()" class="nav-link">← Return to Book</a>
    </div>
    <script src="order_images.js"></script>
</body>
</html>
